# -------------------------------------------------------------------------------------
# Hugo Configuration
# See: https://gohugo.io/getting-started/configuration/
# -------------------------------------------------------------------------------------

# website's title
title = "Sachi's Blog"
# hostname (and path) to the root
baseURL = "https://codebearjourney.top/"
# default theme for this website
theme = ["ksimple"] 
# language code, only here CN uppercase ["en", "zh-CN", "fr", "pl", ...]
languageCode = "zh-CN"
# whether to use emoji code
enableEmoji = true
# default front matter format 
metaDataFormat = "toml"
# exclude specific files from a build
ignoreFiles = [ "_cache$" ]
footnotereturnlinkcontents = "↩"


[params]
description = "Welcome to Sachi's blog!"
footer = "&copy; [Sachi](https://codebearjourney.top/) 2025 -- {Year} | 🎨[KSimple](https://github.com/captainwc/captainwc.github.io/tree/main/themes/ksimple)"
favicon = "/images/favicon.png"
githubUserName = "tianyuxbear"

[permalinks]
note = "/note/:year/:month/:day/:slug/"
post = "/post/:year/:month/:day/:slug/"

[taxonomies]
categories = "categories"
tags = "tags"
series = "series"
archives = "archives"

[[menu.main]]
name = "主页"
url = ""
weight = 1

[[menu.main]]
name = "专栏"
url = "series/"
weight = 2

[[menu.main]]
name = "分类"
url = "categories/"
weight = 3

[[menu.main]]
name = "标签"
url = "tags/"
weight = 4

[[menu.main]]
name = "归档"
url = "archives/"
weight = 5

[[menu.main]]
name = "搜索"
url = "search/"
weight = 6

[[menu.main]]
name = "关于"
url = "about/"
weight = 10

[markup.highlight]
codeFences = false

[markup.goldmark.parser.attribute]
block = true

[markup.goldmark.renderer]
unsafe = true

[markup.goldmark.extensions.typographer]
enable = false

[markup.goldmark.extensions.passthrough]
enable = true

[markup.goldmark.extensions.passthrough.delimiters]
block = [ [ "\\[", "\\]" ], [ "$$", "$$" ] ]
inline = [ [ "\\(", "\\)" ] ]
